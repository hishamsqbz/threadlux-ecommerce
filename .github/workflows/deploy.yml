name: Deploy Threadlux

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Ubuntu Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 38.54.8.216
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/threadlux-ecommerce
            git pull origin main
            
            # Restart backend
            cd /root/threadlux-ecommerce/backend
            ./venv/bin/pip install -r requirements.txt
            screen -S backend -X quit || true
            screen -dmS backend bash -c "cd /root/threadlux-ecommerce/backend && ./venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000"
            
            # Build and deploy frontend
            cd /root/threadlux-ecommerce/frontend
            npm install
            npm run build
            cp -r dist/* /var/www/html/
            systemctl restart nginx
